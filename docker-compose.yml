services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airq
      POSTGRES_PASSWORD: airq
      POSTGRES_DB: airq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./infra/monitoring/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "8000:8000"

  sensor-gateway:
    build:
      context: .
      dockerfile: services/sensor-gateway/Dockerfile
    env_file: .env
    environment:
      METRICS_PORT: 9101
    depends_on:
      - postgres
      - mosquitto
    restart: unless-stopped
    ports:
      - "9101:9101"

  collector-openmeteo:
    build:
      context: .
      dockerfile: services/collector-openmeteo/Dockerfile
    env_file: .env
    environment:
      METRICS_PORT: 9102
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "9102:9102"

  collector-fhmz:
    build:
      context: .
      dockerfile: services/collector-fhmz/Dockerfile
    env_file: .env
    environment:
      METRICS_PORT: 9103
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "9103:9103"

  processor:
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    env_file: .env
    environment:
      METRICS_PORT: 9104
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "9104:9104"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
      - sensor-gateway
      - collector-openmeteo
      - collector-fhmz
      - processor

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:12.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
