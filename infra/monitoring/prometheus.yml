global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
    metrics_path: /metrics
  - job_name: sensor_gateway
    static_configs:
      - targets: ["sensor-gateway:9101"]
  - job_name: collector_openmeteo
    static_configs:
      - targets: ["collector-openmeteo:9102"]
  - job_name: collector_fhmz
    static_configs:
      - targets: ["collector-fhmz:9103"]
  - job_name: processor
    static_configs:
      - targets: ["processor:9104"]

