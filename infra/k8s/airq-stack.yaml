apiVersion: v1
kind: Namespace
metadata:
  name: airq
---
apiVersion: v1
kind: Secret
metadata:
  name: airq-secrets
  namespace: airq
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg2://airq:airq@postgres:5432/airq
  JWT_SECRET: change-me-very-long-random-string
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airq-config
  namespace: airq
data:
  APP_ENV: dev
  API_HOST: 0.0.0.0
  API_PORT: "8000"
  MQTT_HOST: mosquitto
  MQTT_PORT: "1883"
  MQTT_TOPIC: airq/+/+
  COLLECTOR_INTERVAL_MINUTES: "5"
  FHMZ_URL: https://www.fhmzbih.gov.ba/latinica/ZRAK/AQI-satne.php
  OPEN_METEO_URL: https://air-quality-api.open-meteo.com/v1/air-quality
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: airq
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: airq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: airq
            - name: POSTGRES_PASSWORD
              value: airq
            - name: POSTGRES_DB
              value: airq
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: airq
spec:
  selector:
    app: mosquitto
  ports:
    - port: 1883
      targetPort: 1883
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: airq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - containerPort: 1883
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: airq
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: airq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: airq-api:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: airq-config
            - secretRef:
                name: airq-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-gateway
  namespace: airq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor-gateway
  template:
    metadata:
      labels:
        app: sensor-gateway
    spec:
      containers:
        - name: sensor-gateway
          image: airq-sensor-gateway:latest
          imagePullPolicy: Never
          env:
            - name: METRICS_PORT
              value: "9101"
          envFrom:
            - configMapRef:
                name: airq-config
            - secretRef:
                name: airq-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-openmeteo
  namespace: airq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector-openmeteo
  template:
    metadata:
      labels:
        app: collector-openmeteo
    spec:
      containers:
        - name: collector-openmeteo
          image: airq-collector-openmeteo:latest
          imagePullPolicy: Never
          env:
            - name: METRICS_PORT
              value: "9102"
          envFrom:
            - configMapRef:
                name: airq-config
            - secretRef:
                name: airq-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-fhmz
  namespace: airq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector-fhmz
  template:
    metadata:
      labels:
        app: collector-fhmz
    spec:
      containers:
        - name: collector-fhmz
          image: airq-collector-fhmz:latest
          imagePullPolicy: Never
          env:
            - name: METRICS_PORT
              value: "9103"
          envFrom:
            - configMapRef:
                name: airq-config
            - secretRef:
                name: airq-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: airq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: airq-processor:latest
          imagePullPolicy: Never
          env:
            - name: METRICS_PORT
              value: "9104"
          envFrom:
            - configMapRef:
                name: airq-config
            - secretRef:
                name: airq-secrets